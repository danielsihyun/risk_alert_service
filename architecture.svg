<svg width="680" viewBox="0 0 680 1220" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
  .ts { font-size: 12px; font-weight: 400; fill: #6b6b6b; }
  .title { font-size: 16px; font-weight: 500; fill: #1a1a1a; }
  .arr { stroke: #888; stroke-width: 1.5; }
  .leader { stroke: #aaa; stroke-width: 0.5; stroke-dasharray: 3 3; }

  .fill-gray { fill: #F1EFE8; stroke: #B4B2A9; }
  .fill-blue { fill: #E6F1FB; stroke: #85B7EB; }
  .fill-teal { fill: #E1F5EE; stroke: #5DCAA5; }
  .fill-purple { fill: #EEEDFE; stroke: #AFA9EC; }
  .fill-coral { fill: #FAECE7; stroke: #F0997B; }
  .fill-amber { fill: #FAEEDA; stroke: #FAC775; }
  .fill-pink { fill: #FBEAF0; stroke: #ED93B1; }

  .text-gray { fill: #444441; }
  .text-blue { fill: #0C447C; }
  .text-teal { fill: #085041; }
  .text-purple { fill: #3C3489; }
  .text-coral { fill: #712B13; }
  .text-amber { fill: #633806; }
  .text-pink { fill: #72243E; }
  .text-sub-gray { fill: #5F5E5A; }
  .text-sub-blue { fill: #185FA5; }
  .text-sub-teal { fill: #0F6E56; }
  .text-sub-purple { fill: #534AB7; }
  .text-sub-coral { fill: #993C1D; }
  .text-sub-amber { fill: #854F0B; }
  .text-sub-pink { fill: #993556; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="title" x="340" y="28" text-anchor="middle">POST /runs — full request flow</text>

<!-- CLIENT -->
<rect class="fill-gray" x="250" y="46" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th text-gray" x="340" y="66" text-anchor="middle" dominant-baseline="central">Client</text>
<line x1="340" y1="86" x2="340" y2="112" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="348" y="103" text-anchor="start">POST /runs {uri, month}</text>

<!-- FASTAPI -->
<rect class="fill-blue" x="220" y="112" width="240" height="50" rx="8" stroke-width="0.5"/>
<text class="th text-blue" x="340" y="130" text-anchor="middle" dominant-baseline="central">FastAPI</text>
<text class="ts text-sub-blue" x="340" y="147" text-anchor="middle" dominant-baseline="central">main.py</text>
<line x1="340" y1="162" x2="340" y2="188" class="arr" marker-end="url(#arrow)"/>

<!-- ENGINE CONTAINER -->
<rect class="fill-purple" x="40" y="188" width="600" height="890" rx="16" stroke-width="0.5"/>
<text class="th text-purple" x="340" y="212" text-anchor="middle">engine.py — orchestrator</text>

<!-- Step 1 -->
<rect class="fill-teal" x="140" y="228" width="200" height="40" rx="8" stroke-width="0.5"/>
<text class="th text-teal" x="240" y="248" text-anchor="middle" dominant-baseline="central">1. Create run record</text>
<rect class="fill-gray" x="440" y="228" width="160" height="40" rx="8" stroke-width="0.5"/>
<text class="th text-gray" x="520" y="248" text-anchor="middle" dominant-baseline="central">SQLite</text>
<line x1="340" y1="248" x2="438" y2="248" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="388" y="240" text-anchor="middle">INSERT run</text>
<line x1="240" y1="268" x2="240" y2="296" class="arr" marker-end="url(#arrow)"/>

<!-- Step 2 -->
<rect class="fill-teal" x="110" y="296" width="260" height="50" rx="8" stroke-width="0.5"/>
<text class="th text-teal" x="240" y="314" text-anchor="middle" dominant-baseline="central">2. Read parquet</text>
<text class="ts text-sub-teal" x="240" y="331" text-anchor="middle" dominant-baseline="central">storage.py — open_uri()</text>
<rect class="fill-gray" x="440" y="296" width="160" height="50" rx="8" stroke-width="0.5"/>
<text class="th text-gray" x="520" y="314" text-anchor="middle" dominant-baseline="central">Parquet file</text>
<text class="ts text-sub-gray" x="520" y="331" text-anchor="middle" dominant-baseline="central">file:// gs:// s3://</text>
<line x1="438" y1="321" x2="372" y2="321" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="405" y="313" text-anchor="middle">Filtered read</text>
<line x1="240" y1="346" x2="240" y2="374" class="arr" marker-end="url(#arrow)"/>

<!-- Step 3 -->
<rect class="fill-teal" x="80" y="374" width="320" height="50" rx="8" stroke-width="0.5"/>
<text class="th text-teal" x="240" y="392" text-anchor="middle" dominant-baseline="central">3. Process month</text>
<text class="ts text-sub-teal" x="240" y="409" text-anchor="middle" dominant-baseline="central">processing.py — dedup, filter, duration</text>
<line x1="240" y1="424" x2="240" y2="456" class="arr" marker-end="url(#arrow)"/>

<!-- Loop container -->
<rect class="fill-coral" x="60" y="456" width="550" height="440" rx="12" stroke-width="0.5"/>
<text class="th text-coral" x="335" y="478" text-anchor="middle">4. For each alert — _deliver_alert()</text>

<!-- 4a: Idempotency -->
<polygon class="fill-amber" points="240,498 340,528 240,558 140,528" stroke-width="0.5"/>
<text class="th text-amber" x="240" y="528" text-anchor="middle" dominant-baseline="central">Already sent?</text>
<line x1="340" y1="528" x2="430" y2="528" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="362" y="520" text-anchor="start">sent</text>
<rect class="fill-gray" x="432" y="508" width="150" height="40" rx="8" stroke-width="0.5"/>
<text class="ts text-sub-gray" x="507" y="528" text-anchor="middle" dominant-baseline="central">→ skipped_replay</text>
<line x1="240" y1="558" x2="240" y2="588" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="248" y="577" text-anchor="start">new/failed</text>

<!-- 4b: Route -->
<polygon class="fill-amber" points="240,588 340,618 240,648 140,618" stroke-width="0.5"/>
<text class="th text-amber" x="240" y="618" text-anchor="middle" dominant-baseline="central">Region valid?</text>
<line x1="340" y1="618" x2="430" y2="618" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="362" y="610" text-anchor="start">null/missing</text>
<rect class="fill-gray" x="432" y="598" width="150" height="40" rx="8" stroke-width="0.5"/>
<text class="ts text-sub-gray" x="507" y="618" text-anchor="middle" dominant-baseline="central">→ failed: unknown_region</text>
<line x1="240" y1="648" x2="240" y2="678" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="248" y="667" text-anchor="start">valid</text>

<!-- 4c: Dry run -->
<polygon class="fill-amber" points="240,678 340,708 240,738 140,708" stroke-width="0.5"/>
<text class="th text-amber" x="240" y="708" text-anchor="middle" dominant-baseline="central">Dry run?</text>
<line x1="340" y1="708" x2="430" y2="708" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="362" y="700" text-anchor="start">true</text>
<rect class="fill-gray" x="432" y="688" width="150" height="40" rx="8" stroke-width="0.5"/>
<text class="ts text-sub-gray" x="507" y="708" text-anchor="middle" dominant-baseline="central">→ record dry_run</text>
<line x1="240" y1="738" x2="240" y2="768" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="248" y="757" text-anchor="start">false</text>

<!-- 4d: Slack send -->
<rect class="fill-blue" x="140" y="768" width="200" height="50" rx="8" stroke-width="0.5"/>
<text class="th text-blue" x="240" y="786" text-anchor="middle" dominant-baseline="central">d. Send to Slack</text>
<text class="ts text-sub-blue" x="240" y="803" text-anchor="middle" dominant-baseline="central">slack.py — retry + backoff</text>
<rect class="fill-gray" x="432" y="768" width="150" height="50" rx="8" stroke-width="0.5"/>
<text class="th text-gray" x="507" y="786" text-anchor="middle" dominant-baseline="central">Slack / mock</text>
<text class="ts text-sub-gray" x="507" y="803" text-anchor="middle" dominant-baseline="central">POST /{channel}</text>
<line x1="340" y1="793" x2="430" y2="793" class="arr" marker-end="url(#arrow)"/>
<line x1="240" y1="818" x2="240" y2="848" class="arr" marker-end="url(#arrow)"/>

<!-- 4e: Persist -->
<rect class="fill-amber" x="140" y="848" width="200" height="40" rx="8" stroke-width="0.5"/>
<text class="th text-amber" x="240" y="868" text-anchor="middle" dominant-baseline="central">e. Persist outcome</text>
<line x1="340" y1="868" x2="430" y2="868" class="arr" marker-end="url(#arrow)"/>
<rect class="fill-gray" x="432" y="848" width="150" height="40" rx="8" stroke-width="0.5"/>
<text class="ts text-sub-gray" x="507" y="868" text-anchor="middle" dominant-baseline="central">SQLite — sent | failed</text>

<!-- End loop → Step 5 -->
<line x1="240" y1="896" x2="240" y2="930" class="arr" marker-end="url(#arrow)"/>

<!-- Step 5: Email -->
<rect class="fill-pink" x="100" y="930" width="280" height="50" rx="8" stroke-width="0.5"/>
<text class="th text-pink" x="240" y="948" text-anchor="middle" dominant-baseline="central">5. Email stub</text>
<text class="ts text-sub-pink" x="240" y="965" text-anchor="middle" dominant-baseline="central">Aggregated unknown region alert</text>
<text class="ts" x="390" y="955" text-anchor="start">→ support@quadsci.ai</text>
<line x1="240" y1="980" x2="240" y2="1010" class="arr" marker-end="url(#arrow)"/>

<!-- Step 6: Finalize -->
<rect class="fill-teal" x="100" y="1010" width="280" height="40" rx="8" stroke-width="0.5"/>
<text class="th text-teal" x="240" y="1030" text-anchor="middle" dominant-baseline="central">6. Update run → succeeded</text>
<line x1="380" y1="1030" x2="438" y2="1030" class="arr" marker-end="url(#arrow)"/>
<rect class="fill-gray" x="440" y="1010" width="160" height="40" rx="8" stroke-width="0.5"/>
<text class="ts text-sub-gray" x="520" y="1030" text-anchor="middle" dominant-baseline="central">SQLite — UPDATE run</text>

<!-- Return -->
<line x1="240" y1="1078" x2="240" y2="1108" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="248" y="1097" text-anchor="start">return run_id</text>

<!-- Response -->
<rect class="fill-gray" x="160" y="1108" width="280" height="40" rx="8" stroke-width="0.5"/>
<text class="th text-gray" x="300" y="1128" text-anchor="middle" dominant-baseline="central">Response: {"run_id": "uuid"}</text>

<!-- Other flows -->
<text class="ts" x="340" y="1180" text-anchor="middle">GET /runs/{id} → reads SQLite → returns status, counts, samples</text>
<text class="ts" x="340" y="1198" text-anchor="middle">POST /preview → runs steps 2-3 only → returns alerts inline, no persistence</text>

</svg>
